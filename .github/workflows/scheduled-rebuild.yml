name: 'Scheduled rebuild (publish future posts)'
on:
  schedule:
    - cron: '0 0 * * *'   # daily 00:00 UTC = 09:00 KST
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Automatic build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run pages-deploy.yml \
            --repo ${{ github.repository }} \
            --ref master
