#  The contact options.

# "back to mathsystem.dev root" — the blog lives under /blog/, so this is
# the only cross-site nav from Chirpy back to the Math System landing page.
# Uses the `else` branch in _includes/sidebar.html URL resolution (types
# other than github/twitter/email/rss fall through to entry.url).
# `noblank: true` keeps navigation in the same tab (same origin).
-
  type: mathsystem
  icon: 'fas fa-arrow-left'
  url: '/'
  noblank: true
-
  type: github
  icon: 'fab fa-github'
-
  type: twitter
  icon: 'fab fa-twitter'
-
  type: email
  icon: 'fas fa-envelope'
  noblank: true            # open link in current tab
-
  type: rss
  icon: 'fas fa-rss'
  noblank: true

# Uncomment and complete the url below to enable more contact options
# -
#   type: mastodon
#   icon: 'fab fa-mastodon'   # icons powered by <https://fontawesome.com/>
#   url:  ''                  # Fill with your mastodon account page
# -
#   type: linkedin
#   icon: 'fab fa-linkedin'   # icons powered by <https://fontawesome.com/>
#   url:  ''                  # Fill with your Linkedin homepage
# -
