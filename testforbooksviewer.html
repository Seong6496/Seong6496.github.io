<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전자책 뷰어</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Marked.js 라이브러리 로드 (Markdown을 HTML로 변환) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f0f2f5; /* Light gray background */
        }
        /* Custom scrollbar for content area */
        .content-area::-webkit-scrollbar {
            width: 8px;
        }
        .content-area::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .content-area::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Basic styling for content within the viewer */
        .content-area h1 {
            font-size: 2.25rem; /* text-4xl */
            font-weight: 700; /* font-bold */
            margin-bottom: 1rem;
            color: #333;
        }
        .content-area h2 {
            font-size: 1.875rem; /* text-3xl */
            font-weight: 600; /* font-semibold */
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #444;
        }
        .content-area p {
            margin-bottom: 1rem;
            line-height: 1.75; /* leading-relaxed */
            color: #555;
        }
        .content-area ul, .content-area ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
            list-style-position: inside;
            color: #555;
        }
        .content-area ul {
            list-style-type: disc;
        }
        .content-area ol {
            list-style-type: decimal;
        }
        .content-area a {
            color: #3b82f6; /* blue-500 */
            text-decoration: underline;
        }
        .content-area pre {
            background-color: #e2e8f0; /* slate-200 */
            padding: 1rem;
            border-radius: 0.5rem; /* rounded-lg */
            overflow-x: auto;
            margin-bottom: 1rem;
            font-family: 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', monospace;
            color: #333;
        }
        .content-area code {
            font-family: 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', monospace;
            background-color: #e2e8f0; /* slate-200 */
            padding: 0.2em 0.4em;
            border-radius: 0.25rem;
            font-size: 0.875em;
            color: #c2410c; /* orange-700 */
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar (Table of Contents) -->
    <aside class="w-64 bg-white shadow-lg p-6 flex flex-col rounded-r-lg m-4 overflow-y-auto">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">목차</h2>
        <nav id="chapter-list" class="flex-grow">
            <ul class="space-y-3">
                <!-- data-chapter 값은 GitHub 저장소의 실제 Markdown 파일 이름(확장자 제외)과 일치해야 합니다. -->
                <li><a href="#" data-chapter="introduction" class="block text-lg text-blue-600 hover:text-blue-800 hover:bg-blue-50 p-2 rounded-md transition-colors duration-200">1. 시작하기</a></li>
                <li><a href="#" data-chapter="getting-content" class="block text-lg text-blue-600 hover:text-blue-800 hover:bg-blue-50 p-2 rounded-md transition-colors duration-200">2. 블로그 콘텐츠 가져오기</a></li>
                <li><a href="#" data-chapter="customization" class="block text-lg text-blue-600 hover:text-blue-800 hover:bg-blue-50 p-2 rounded-md transition-colors duration-200">3. 뷰어 커스터마이징</a></li>
                <li><a href="#" data-chapter="advanced-features" class="block text-lg text-blue-600 hover:text-blue-800 hover:bg-blue-50 p-2 rounded-md transition-colors duration-200">4. 고급 기능</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-grow bg-white shadow-lg p-8 m-4 rounded-l-lg overflow-y-auto content-area">
        <div id="content-display">
            <!-- 콘텐츠가 여기에 동적으로 로드됩니다. -->
            <h1 class="text-4xl font-bold text-gray-800 mb-4">GitHub 블로그를 전자책 뷰어처럼</h1>
            <p class="text-lg leading-relaxed text-gray-700">
                왼쪽 목차에서 챕터를 선택하여 내용을 확인하세요.
            </p>
            <p class="text-lg leading-relaxed text-gray-700">
                이 뷰어는 GitHub 블로그의 Markdown 파일을 직접 가져와 HTML로 변환하여 표시합니다.
            </p>
            <div role="status" id="loading-indicator" class="hidden flex items-center justify-center py-8">
                <svg aria-hidden="true" class="w-8 h-8 text-gray-200 animate-spin dark:text-gray-600 fill-blue-600" viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z" fill="currentColor"/>
                    <path d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.911 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z" fill="currentFill"/>
                </svg>
                <span class="sr-only">Loading...</span>
            </div>
        </div>
    </main>

    <script>
        const contentDisplay = document.getElementById('content-display');
        const chapterList = document.getElementById('chapter-list');
        const loadingIndicator = document.getElementById('loading-indicator');

        // Marked.js 설정 (선택 사항: 추가 옵션 설정 가능)
        marked.setOptions({
            gfm: true, // GitHub Flavored Markdown 활성화
            breaks: true, // 줄 바꿈을 <br> 태그로 변환
            sanitize: true // HTML 삽입 방지 (보안을 위해 권장)
        });

        /**
         * GitHub 블로그의 Markdown 파일을 가져와 HTML로 변환하여 표시합니다.
         * @param {string} chapterId - 로드할 챕터의 ID (Markdown 파일 이름과 일치).
         */
        async function loadChapter(chapterId) {
            // 로딩 인디케이터 표시
            loadingIndicator.classList.remove('hidden');
            contentDisplay.innerHTML = ''; // 기존 콘텐츠 지우기

            // !!! 중요: 아래 URL을 여러분의 GitHub 저장소 정보로 변경하세요 !!!
            // 예시: https://raw.githubusercontent.com/your-username/your-repo/main/_posts/your-chapter-id.md
            // 일반적으로 GitHub Pages는 `main` 또는 `master` 브랜치에 배포됩니다.
            // 블로그 게시물은 보통 `_posts` 디렉토리에 있습니다.
            const githubUsername = 'your-username'; // 여러분의 GitHub 사용자 이름
            const githubRepo = 'your-repo';       // 여러분의 블로그 저장소 이름
            const githubBranch = 'main';          // 여러분의 블로그 브랜치 (main 또는 master)
            const postsDirectory = '_posts';      // Markdown 파일이 있는 디렉토리

            const filePath = `https://raw.githubusercontent.com/${githubUsername}/${githubRepo}/${githubBranch}/${postsDirectory}/${chapterId}.md`;

            try {
                const response = await fetch(filePath);

                if (!response.ok) {
                    // HTTP 오류 (예: 404 Not Found) 처리
                    if (response.status === 404) {
                        throw new Error(`챕터 '${chapterId}.md'를 찾을 수 없습니다. 파일 경로를 확인해주세요.`);
                    }
                    throw new Error(`HTTP 오류! 상태 코드: ${response.status}`);
                }

                const markdown = await response.text();
                const htmlContent = marked.parse(markdown); // Marked.js를 사용하여 Markdown을 HTML로 변환
                contentDisplay.innerHTML = htmlContent;
                contentDisplay.scrollTop = 0; // 챕터 로드 후 스크롤을 맨 위로 이동

            } catch (error) {
                console.error('챕터 로드 중 오류 발생:', error);
                contentDisplay.innerHTML = `
                    <div class="p-6 bg-red-100 border border-red-400 text-red-700 rounded-lg" role="alert">
                        <p class="font-bold">콘텐츠 로드 오류!</p>
                        <p>챕터를 로드할 수 없습니다: ${error.message}</p>
                        <p class="mt-2 text-sm">
                            GitHub 사용자 이름, 저장소 이름, 브랜치, 파일 경로가 올바른지 확인해주세요.
                            <br>예시: <code>https://raw.githubusercontent.com/<b>your-username</b>/<b>your-repo</b>/<b>main</b>/<b>_posts</b>/${chapterId}.md</code>
                        </p>
                    </div>
                `;
            } finally {
                // 로딩 인디케이터 숨기기
                loadingIndicator.classList.add('hidden');
            }

            // 활성 챕터 강조 표시
            document.querySelectorAll('#chapter-list a').forEach(link => {
                link.classList.remove('font-semibold', 'text-blue-800', 'bg-blue-100');
                link.classList.add('text-blue-600', 'hover:text-blue-800', 'hover:bg-blue-50');
            });
            const activeLink = document.querySelector(`a[data-chapter="${chapterId}"]`);
            if (activeLink) {
                activeLink.classList.add('font-semibold', 'text-blue-800', 'bg-blue-100');
                activeLink.classList.remove('text-blue-600', 'hover:text-blue-800', 'hover:bg-blue-50');
            }
        }

        // 챕터 링크 클릭 이벤트 리스너
        chapterList.addEventListener('click', function(event) {
            event.preventDefault(); // 기본 링크 동작 방지
            const target = event.target;
            if (target.tagName === 'A' && target.dataset.chapter) {
                loadChapter(target.dataset.chapter);
            }
        });

        // 페이지 로드 시 첫 번째 챕터 로드
        window.onload = function() {
            // 기본 챕터 로드 (data-chapter="introduction"에 해당하는 Markdown 파일이 있어야 합니다)
            loadChapter('introduction');
        };
    </script>
</body>
</html>
