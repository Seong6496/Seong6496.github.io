# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Change the following value to '/PROJECT_NAME' ONLY IF your site type is GitHub Pages Project sites
# and doesn't have a custom domain.
baseurl: ''

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
# If it has the same name as one of the files in folder `_data/locales`, the layout language will also be changed,
# otherwise, the layout language will use the default value of 'en'.
lang: ko-KR

# Additional parameters for datetime localization, optional. › https://github.com/iamkun/dayjs/tree/dev/src/locale
prefer_datetime_locale:

# Change to your timezone › http://www.timezoneconverter.com/cgi-bin/findzone/findzone
timezone: Asia/Seoul

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: Math System                       # the main title

tagline: LaTeX·수식·도구 이야기            # it will display as the sub-title

description: >-                        # used by seo meta and the atom feed
  Math System 블로그 — LaTeX, 수식, Google Docs·Word 에서 수학 글쓰기를 다루는 곳. LaTeXFlow 가 운영합니다.

# Default social preview image (og:image, twitter:image) for pages
# without their own front-matter `image:`. 1200x630 brand banner.
image: /assets/img/og/mathsystem-og.png

# fill in the protocol & hostname for your site, e.g., 'https://username.github.io'
url: 'https://mathsystem.dev'

github:
  username: Seong6496             # change to your github username

social:
  # Change to your full name.
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: Math System
  email: sung2417@gmail.com             # change to your email address
  links:
    # The first element serves as the copyright owner's link
    - https://github.com/Seong6496       # change to your github homepage
    # Uncomment below to add more social links
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

google_site_verification:               # fill in to your verification string

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

google_analytics:
  id: G-CF55QKHZBZ    # mathsystem.dev GA4 property
  # Google Analytics pageviews report settings

cloudflare_analytics:
  # Cloudflare Web Analytics beacon token. Get it from:
  # Cloudflare dashboard -> Analytics & Logs -> Web Analytics -> Add a site
  # -> domain: mathsystem.dev -> copy the value of data-cf-beacon "token".
  # Script only injects when this is non-empty AND jekyll env is production.
  token: ''
  pv:
    proxy_endpoint:   # fill in the Google Analytics superProxy endpoint of Google App Engine
    cache_path:       # the local PV cache data, friendly to visitors from GFW region

# Prefer color scheme setting.
#
# Note: Keep empty will follow the system prefer color by default,
# and there will be a toggle to switch the theme between dark and light
# on the bottom left of the sidebar.
#
# Available options:
#
#     light  - Use the light color scheme
#     dark   - Use the dark color scheme
#
theme_mode:   # [light|dark]

# The CDN endpoint for images. Disabled: with a value set, Chirpy's
# _includes/head.html rewrites og:image/twitter:image URLs to point at
# this CDN — for us that means our brand OG image at
# /assets/img/og/mathsystem-og.png gets redirected to the Chirpy demo
# repo and 404s. Post-body images use local `/assets/img/posts/...`
# which are unaffected by this setting.
#
# e.g. 'https://cdn.com'
img_cdn:

# the avatar on sidebar, support local or CORS resources
avatar: '/commons/avatar.jpg'

# boolean type, the global switch for ToC in posts.
toc: true

comments:
  active: giscus  # The global switch for posts comments, e.g., 'disqus'.  Keep it empty means disable
  # The active options are as follows:
  disqus:
    shortname: 'HM'   # fill with the Disqus shortname. › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances settings › https://utteranc.es/
  utterances:
    repo:         # <gh-username>/<repo>
    issue_term:   # < url | pathname | title | ...>
  # Giscus options › https://giscus.app
  giscus:
    repo: Seong6496/Seong6496.github.io
    repo_id: R_kgDOHGf2gA
    category: Announcements
    category_id: DIC_kwDOHGf2gM4DAHL4
    mapping: pathname
    input_position: bottom
    lang: ko

# Self-hosted static assets, optional › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled:      # boolean, keep empty means false
    # specify the Jekyll environment, empty means both
    # only works if `assets.self_host.enabled` is 'true'
    env:          # [development|production]

paginate: 100
paginate_path: '/blog/page:num/'

# Scheduled publishing — keep `future: false` so posts with a future `date:` are
# excluded from the build until that date arrives. The daily cron in
# .github/workflows/scheduled-rebuild.yml triggers a rebuild every day at
# 09:00 KST; on that rebuild any post whose `date:` is now in the past is
# included and goes live automatically.
future: false

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:   # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ''          # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true    # Enable comments in posts.
      toc: true         # Display TOC column in posts.
      # All blog content scoped under /blog/ — see also the matching
      # /blog/ prefixes in _layouts/post.html, categories.html, tags.html
      # and _includes/trending-tags.html. Keep these in lockstep.
      permalink: /blog/posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ''
      type: tabs             # see `site.collections`
    values:
      layout: page
      permalink: /blog/:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true
  - scope:
      path: assets/js/dist
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - '*.gem'
  - '*.gemspec'
  - tools
  - README.md
  - LICENSE
  - gulpfile.js
  - node_modules
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /blog/tags/:name/
    category: /blog/categories/:name/
