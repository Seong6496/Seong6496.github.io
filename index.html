<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math System</title>
  <meta name="description" content="Math System — LaTeXFlow 와 Mathfolis 를 만드는 곳." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --blue-light: #eff6ff;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --bg: #ffffff;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--blue); }
    .nav-links {
      display: flex;
      gap: 28px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .nav-links a:hover { color: var(--text); }

    /* HERO */
    .hero {
      padding: 100px 24px 60px;
      text-align: center;
      background: linear-gradient(180deg, #f0f7ff 0%, #ffffff 100%);
    }
    .hero h1 {
      font-size: clamp(2.4rem, 6vw, 3.75rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero h1 span { color: var(--blue); }
    .hero p {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 540px;
      margin: 0 auto;
    }

    /* PRODUCTS */
    section.products {
      padding: 60px 24px 80px;
    }
    .products-inner {
      max-width: 980px;
      margin: 0 auto;
    }
    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 12px;
      text-align: center;
    }
    .section-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
      text-align: center;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .product-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      box-shadow: 0 10px 28px rgba(37, 99, 235, 0.10);
      transform: translateY(-2px);
      border-color: #c7d8f5;
    }
    .product-card h3 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .product-card h3 span { color: var(--blue); }
    .product-tagline {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      flex: 1;
    }
    .product-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--blue);
      transition: gap 0.15s;
    }
    .product-card:hover .product-link { gap: 10px; }

    /* BLOG ENTRY */
    section.blog-entry {
      background: #fafafa;
      padding: 70px 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    .blog-entry h2 {
      font-size: clamp(1.4rem, 2.6vw, 1.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .blog-entry p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); color: #fff; }

    /* FOOTER */
    footer {
      background: #f9fafb;
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
    }
    .footer-copy { font-size: 0.8rem; color: var(--text-muted); }
    .footer-links {
      display: flex;
      gap: 18px;
      justify-content: center;
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 640px) {
      .hero { padding: 72px 24px 50px; }
      section.products { padding: 50px 24px 60px; }
      section.blog-entry { padding: 60px 24px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <div class="nav-logo">Math<span>System</span></div>
    <div class="nav-links">
      <a href="/blog/">Blog</a>
      <a href="https://github.com/Seong6496" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Math<span>System</span></h1>
  <p>수학을 다루는 사람의 도구를 만듭니다.</p>
</div>

<!-- PRODUCTS -->
<section class="products">
  <div class="products-inner">
    <div class="section-label">Products</div>
    <div class="section-title">우리가 만드는 것</div>
    <div class="product-grid">
      <a class="product-card" href="/latexflow/">
        <h3>LaTeX<span>Flow</span></h3>
        <p class="product-tagline">Google Docs · Word 안의 LaTeX 수식을 한 번에 깔끔하게.</p>
        <span class="product-link">바로 가기 →</span>
      </a>
      <a class="product-card" href="https://mathfolis.mathsystem.dev/" target="_blank" rel="noopener">
        <h3>Math<span>folis</span></h3>
        <p class="product-tagline">수학 문제 생성기.</p>
        <span class="product-link">바로 가기 →</span>
      </a>
    </div>
  </div>
</section>

<!-- BLOG ENTRY -->
<section class="blog-entry">
  <h2>블로그</h2>
  <p>LaTeX · 수식 · 도구 — 수학 글쓰기의 실전 노트.</p>
  <a class="btn-primary" href="/blog/">블로그 보기 →</a>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-copy">© 2026 Math System</div>
  <div class="footer-links">
    <a href="/latexflow/privacy/">Privacy</a>
    <a href="/latexflow/terms/">Terms</a>
    <a href="/latexflow/support/">Support</a>
  </div>
</footer>

</body>
</html>
