<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math System — 수학을 다루는 사람의 도구</title>
  <meta name="description" content="Google Docs용 LaTeX 도구 LaTeXFlow와 같은 문제가 없는 문제집 Mathfolis를 만듭니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       Math System — Design tokens v1 (Light "Paper" theme)
       Inhaled from sample/mathsystem-theme.css for static deployment.
       Phase 1: tokens + topbar + hero. Products/Writing/Footer
       markup untouched in this phase — they will re-render with the
       new tokens but their dedicated component styles arrive in
       Phase 2~4.
       ============================================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #FBFAF6;
      --white: #FFFFFF;
      --ink-900: #191919;
      --ink-600: #5C5A53;
      --ink-500: #75726A;
      --ink-400: #9B9890;
      --accent-700: #1F4FA3;
      --accent-800: #173E82;
      --hairline: rgba(0, 0, 0, 0.12);
      --hairline-soft: rgba(0, 0, 0, 0.08);

      --bg: var(--paper);
      --bg-card: var(--white);
      --text: var(--ink-900);
      --text-muted: var(--ink-500);
      --text-hint: var(--ink-400);
      --accent: var(--accent-700);
      --accent-hover: var(--accent-800);
      --border: var(--hairline);
      --border-soft: var(--hairline-soft);

      --badge-live-bg: #E1F5EE;
      --badge-live-text: #0F6E56;
      --badge-beta-bg: #FAEEDA;
      --badge-beta-text: #854F0B;

      --font-display: 'STIX Two Text', 'Noto Serif KR', 'Times New Roman', serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo',
                   'Pretendard', 'Noto Sans KR', sans-serif;

      --radius: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F1013;
        --bg-card: #17191D;
        --text: #F2F2F0;
        --text-muted: #9DA0A6;
        --text-hint: #6A6D73;
        --accent: #4FD6AC;
        --accent-hover: #6FE0BD;
        --border: rgba(255, 255, 255, 0.09);
        --border-soft: rgba(255, 255, 255, 0.06);
        --badge-live-bg: rgba(79, 214, 172, 0.12);
        --badge-live-text: #4FD6AC;
        --badge-beta-bg: rgba(216, 180, 90, 0.12);
        --badge-beta-text: #D8B45A;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.7;
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: var(--font-display);
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { color: var(--accent-hover); }
    a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    .shell { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 22px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .topbar .brand {
      font-family: var(--font-display); font-weight: 500;
      font-size: 17px; color: var(--text);
    }
    .topbar nav { display: flex; gap: 22px; }
    .topbar nav a {
      font-size: 14px; color: var(--text-muted);
      transition: color 0.15s;
    }
    .topbar nav a:hover { color: var(--accent); }

    .hero { padding: 96px 0 80px; }
    .hero .accent-rule {
      width: 30px; height: 2px;
      background: var(--accent);
      margin-bottom: 28px;
    }
    .hero h1 {
      font-family: var(--font-display); font-weight: 500;
      font-size: clamp(2rem, 5vw, 3.75rem);
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    @media (max-width: 900px) {
      .shell { padding: 0 18px; }
      .hero { padding: 56px 0 48px; }
      .hero h1 { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

<div class="shell">
  <header class="topbar">
    <a class="brand" href="/">MathSystem</a>
    <nav>
      <a href="/blog/">Blog</a>
      <a href="https://github.com/Seong6496" rel="noopener">GitHub</a>
    </nav>
  </header>

  <section class="hero">
    <div class="accent-rule"></div>
    <h1>수학을 다루는 사람의 도구를 만듭니다.</h1>
  </section>
</div>

<!-- Products / blog-entry / footer — Phase 2~4 에서 시안 마크업으로 교체.
     Phase 1 의 검증 범위는 hero + metadata. 아래 영역은 옛 마크업 그대로 두되
     새 토큰에 따라 unstyled 로 보일 수 있음. -->

<section class="products" style="padding: 60px 24px 80px;">
  <div class="products-inner" style="max-width: 1100px; margin: 0 auto;">
    <div class="section-label">Products</div>
    <div class="section-title">우리가 만드는 것</div>
    <div class="product-grid">
      <a class="product-card" href="/latexflow/">
        <h3>LaTeXFlow</h3>
        <p class="product-tagline">Google Docs · Word 안의 LaTeX 수식을 한 번에 깔끔하게.</p>
        <span class="product-link">바로 가기 →</span>
      </a>
      <a class="product-card" href="https://mathfolis.mathsystem.dev/" target="_blank" rel="noopener">
        <h3>Mathfolis</h3>
        <p class="product-tagline">수학 문제 생성기.</p>
        <span class="product-link">바로 가기 →</span>
      </a>
    </div>
  </div>
</section>

<section class="blog-entry" style="padding: 70px 24px; text-align: center; border-top: 0.5px solid var(--border);">
  <a class="btn-primary" href="/blog/">블로그 보기 →</a>
</section>

<footer style="border-top: 0.5px solid var(--border); padding: 28px 24px; text-align: center;">
  <div class="footer-copy" style="font-size: 12px; color: var(--text-hint);">© 2026 Math System</div>
  <div class="footer-links" style="display: flex; gap: 18px; justify-content: center; margin-top: 8px; font-size: 12px;">
    <a href="/latexflow/privacy/">Privacy</a>
    <a href="/latexflow/terms/">Terms</a>
    <a href="/latexflow/support/">Support</a>
  </div>
</footer>

</body>
</html>
