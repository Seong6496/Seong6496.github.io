<!--
  Favicons — Math System brand mark (2026-07).
  All files live in /assets/img/favicons/ (one folder for the whole site,
  shared by Chirpy blog and LaTeXFlow pages).
  SVG is preferred by modern browsers (vector, scales cleanly);
  PNG + ICO cover legacy browsers and pinned tabs.
-->

{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}

<link rel="icon" type="image/svg+xml" href="{{ favicon_path }}/favicon.svg">
<link rel="icon" type="image/png" sizes="16x16" href="{{ favicon_path }}/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="{{ favicon_path }}/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="{{ favicon_path }}/favicon-48.png">
<link rel="shortcut icon" href="{{ favicon_path }}/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="{{ favicon_path }}/apple-touch-icon-180.png">

<meta name="apple-mobile-web-app-title" content="{{ site.title }}">
<meta name="application-name" content="{{ site.title }}">
<meta name="theme-color" content="#F9F4E8">
